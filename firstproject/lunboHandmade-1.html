<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>选择-侬说搭配</title>
    <link rel="stylesheet" href="lunboHandmade-1.css">
</head>
<body>
<!-- 3. 侬说搭配 (截图3 & 4) -->
<section class="section outfit-section">
    <div class="container">
        <!-- 隐藏的单选按钮 -->
        <input type="radio" name="tab" id="tab1" checked>
        <input type="radio" name="tab" id="tab2">
        <input type="radio" name="tab" id="tab3">

        <!-- 标签控制 (左上角) -->
        <div class="tabs-control">
            <label for="tab1" class="tab">推荐</label>
            <label for="tab2" class="tab">羽毛球</label>
            <label for="tab3" class="tab">溯溪</label>
        </div>

        <!-- 轮播内容 -->
        <div class="carousel-container">
            <!-- 第一个页面 -->
            <div class="outfit-page page-1">
                <div class="outfit-content">
                    <div class="outfit-bg-image">
                        <img src="part51.jpg" alt="推荐搭配背景">
                    </div>
                </div>
                <!-- 产品区域移到内容区域下方 -->
                <div class="outfit-products">
                    <div class="product-card">
                        <img src="part51_1.jpg" alt="越野跑鞋">
                        <p>KIPRUN 男士越野跑鞋</p>
                        <span class="price">¥899.90</span>
                    </div>
                    <div class="product-card">
                        <img src="part51_2.jpg" alt="速干T恤">
                        <p>KIPRUN 男士跑步速干T恤</p>
                        <span class="price">¥199.90</span>
                    </div>
                    <div class="product-card">
                        <img src="part51_3.jpg" alt="跑步短裤">
                        <p>KIPRUN 男士跑步短裤</p>
                        <span class="price">¥129.90</span>
                    </div>
                </div>
            </div>

            <!-- 第二个页面 -->
            <div class="outfit-page page-2">
                <div class="outfit-content">
                    <div class="outfit-bg-image">
                        <img src="part80.jpg" alt="羽毛球搭配背景">
                    </div>
                </div>
                <div class="outfit-products">
                    <div class="product-card">
                        <img src="part80_1.jpg" alt="羽毛球鞋">
                        <p>KIPRUN 男士羽毛球鞋</p>
                        <span class="price">¥799.90</span>
                    </div>
                    <div class="product-card">
                        <img src="part80_2.jpg" alt="羽毛球T恤">
                        <p>KIPRUN 男士羽毛球T恤</p>
                        <span class="price">¥179.90</span>
                    </div>
                    <div class="product-card">
                        <img src="part80_3.jpg" alt="羽毛球短裤">
                        <p>KIPRUN 男士羽毛球短裤</p>
                        <span class="price">¥139.90</span>
                    </div>
                </div>
            </div>

            <!-- 第三个页面 -->
            <div class="outfit-page page-3">
                <div class="outfit-content">
                    <div class="outfit-bg-image">
                        <img src="part51_2.jpg" alt="溯溪搭配背景">
                    </div>
                </div>
                <div class="outfit-products">
                    <div class="product-card">
                        <img src="part51_4.jpg" alt="溯溪鞋">
                        <p>KIPRUN 男士溯溪鞋</p>
                        <span class="price">¥849.90</span>
                    </div>
                    <div class="product-card">
                        <img src="part51_5.jpg" alt="溯溪T恤">
                        <p>KIPRUN 男士溯溪T恤</p>
                        <span class="price">¥189.90</span>
                    </div>
                    <div class="product-card">
                        <img src="part51_6.jpg" alt="溯溪裤">
                        <p>KIPRUN 男士溯溪裤</p>
                        <span class="price">¥229.90</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
